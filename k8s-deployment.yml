# =============================================================================
# Secret: Stores sensitive configuration values (DB credentials, AWS resource
# URLs) as base64-encoded data. Referenced by the Deployment's env vars so
# secrets never appear in plain text inside pod specs.
# NOTE: Replace the base64 values below with your actual credentials.
#       Encode with: echo -n "your-value" | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: oddspulse-secret
type: Opaque
data:
  DB_URL: amRiYzpwb3N0Z3Jlc3FsOi8vcG9zdGdyZXM6NTQzMi9vZGRzcHVsc2U=
  DB_USERNAME: b2Rkc191c2Vy
  DB_PASSWORD: b2Rkc19wYXNz
  SQS_QUEUE_URL: aHR0cDovL2xvY2Fsc3RhY2s6NDU2Ni8wMDAwMDAwMDAwMDAvb2Rkcy1mZWVkLXF1ZXVl
  S3_BUCKET_NAME: b2Rkc3B1bHNlLXNuYXBzaG90cw==

---

# =============================================================================
# Deployment: Runs 2 replicas of the OddsPulse application for high
# availability. Each pod pulls the container image from ECR, injects
# secrets as environment variables, and exposes port 8080.
# - livenessProbe:  Restarts the pod if /actuator/health stops responding
#                   (catches deadlocks, OOM situations)
# - readinessProbe: Removes the pod from the Service's load balancer pool
#                   until it's fully ready to accept traffic
# - resources:      Sets CPU/memory guardrails to prevent noisy-neighbor
#                   issues on shared cluster nodes
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oddspulse-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oddspulse
  template:
    metadata:
      labels:
        app: oddspulse
    spec:
      containers:
        - name: oddspulse
          image: <your-ecr-image>:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: oddspulse-secret
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: oddspulse-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oddspulse-secret
                  key: DB_PASSWORD
            - name: SQS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: oddspulse-secret
                  key: SQS_QUEUE_URL
            - name: S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: oddspulse-secret
                  key: S3_BUCKET_NAME
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---

# =============================================================================
# Service: Exposes the OddsPulse pods externally via a cloud load balancer.
# Routes incoming traffic on port 80 to the pods' container port 8080.
# The selector ensures traffic only reaches pods labeled "app: oddspulse".
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: oddspulse-service
spec:
  type: LoadBalancer
  selector:
    app: oddspulse
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
